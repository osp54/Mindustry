name: compile mindustry

on:

  push

jobs: 

  compilegame:

    runs-on: ubuntu-latest

 

    steps: 
    - uses: actions/checkout@v2
    - name: Set up JDK 16
      uses: actions/setup-java@v1
      with:
        java-version: 16
    - name: setup android 
      run: |
        echo "${ANDROID_HOME}/build-tools/30.0.1" >> $GITHUB_PATH
    - name: chmod
      run: chmod +x ./gradlew
    - name: пакинг спрайтов
      run: ./gradlew pack
    - name: пакинг минды в JAR
      run: ./gradlew desktop:dist -Pbuildversion=128.1 -PverionType=release --stacktrace
    - name: пакинг минды в андроид
      run: ./gradlew android:assembleDebug -Pbuildversion=128.1 -PverionType=release --stacktrace
    - name: Set up the release
      id: release
      run: |
        tag=$(cat version.json | grep "version*")       # Cut the line with the version in plugin.json
        tag=$(echo $tag | cut -d ":" -f 2,3)           # Split with ":" and take the version number
        tag=$(echo $tag | tr -d \"," ")                # Trim the " and , and spaces
        echo '::set-output name=RELEASE_TAG::'$tag     # Set the environment variable
        # Get the artifact path
        echo '::set-output name=ARTIFACT_PATH::'$(./gradlew getArtifactPath -q)
      - name: Upload artifacts
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ steps.release.outputs.ARTIFACT_PATH }}
          tag: v${{ steps.release.outputs.RELEASE_TAG }}  
    - name: выгрузка JAR
      uses: actions/upload-artifact@v2
      with:
        name: PC version
        path: desktop/build/libs/Mindustry.jar
    - name: выгрузка APK
      uses: actions/upload-artifact@v2
      with:
        name: Android version
        path: android/build/outputs/apk/*
